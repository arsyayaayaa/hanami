<!DOCTYPE html>
<html lang="en">

<head>
    <!-- =========================================
         Project Hanami
         A Cinematic Birthday Experience
         Version 1.0
    ========================================== -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A Little Gift For You 🌸</title>

    <meta name="description"
        content="A cinematic birthday experience made with love.">

    <meta name="theme-color" content="#FFF8F5">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Great+Vibes&family=Playfair+Display:ital@0;1&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/scenes.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- =========================================
         Loading Screen
    ========================================== -->

    <div id="loading-screen"></div>

    <!-- =========================================
         Floating Decorations
    ========================================== -->

    <div id="petals"></div>

    <div id="sparkles"></div>

    <div id="background-blobs"></div>

    <!-- =========================================
         Audio
    ========================================== -->

    <audio id="bg-music" loop preload="auto">

        <source src="assets/audio/music.mp3" type="audio/mp3">

    </audio>

    <!-- =========================================
         Progress Indicator
    ========================================== -->

    <aside id="progress-indicator">

        <div id="progress-bar"></div>

    </aside>

    <!-- =========================================
         Music Control
    ========================================== -->

    <button id="music-button"
        aria-label="Toggle Music">

        🎵

    </button>

    <!-- =========================================
         Main Story
    ========================================== -->

    <main id="story">

        <!-- Scene 01 -->
        <section id="scene-prologue"
            class="scene">

        </section>

        <!-- Scene 02 -->
        <section id="scene-gift"
            class="scene">

        </section>

        <!-- Scene 03 -->
        <section id="scene-letter"
            class="scene">

        </section>

        <!-- Scene 04 -->
        <section id="scene-gallery"
            class="scene">

        </section>

        <!-- Scene 05 -->
        <section id="scene-timeline"
            class="scene">

        </section>

        <!-- Scene 06 -->
        <section id="scene-wishes"
            class="scene">

        </section>

        <!-- Scene 07 -->
        <section id="scene-celebration"
            class="scene">

        </section>

        <!-- Scene 08 -->
        <section id="scene-ending"
            class="scene">

        </section>

    </main>

    <!-- =========================================
         Global Modal
    ========================================== -->

    <div id="modal-root"></div>

    <!-- =========================================
         Scripts
    ========================================== -->

    <script src="js/config.js"></script>

    <script src="js/managers/sceneManager.js"></script>

    <script src="js/managers/audioManager.js"></script>

    <script src="js/managers/uiManager.js"></script>

    <script src="js/managers/animationManager.js"></script>

    <script src="js/components/petals.js"></script>

    <script src="js/components/gallery.js"></script>

    <script src="js/components/typing.js"></script>

    <script src="js/components/progress.js"></script>

    <script src="js/components/confetti.js"></script>

    <script src="js/components/cursor.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
